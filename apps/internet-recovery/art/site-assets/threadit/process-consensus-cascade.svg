<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">Consensus Cascade process diagram</title>
  <desc id="desc">One Auto-Fix process branches to five apparent accounts that share the same origin.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10Z" fill="#6655A6"/>
    </marker>
  </defs>
  <rect x="12" y="48" width="142" height="84" rx="12" fill="#EEE9FA" stroke="#6655A6" stroke-width="4"/>
  <rect x="30" y="64" width="44" height="38" rx="8" fill="#FFFFFF" stroke="#17212B" stroke-width="3"/>
  <circle cx="43" cy="82" r="4" fill="#6655A6"/>
  <circle cx="61" cy="82" r="4" fill="#6655A6"/>
  <path d="M42 92h20" stroke="#17212B" stroke-width="3" stroke-linecap="round"/>
  <text x="86" y="82" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#17212B">AUTO-FIX</text>
  <text x="86" y="103" font-family="Arial, sans-serif" font-size="13" fill="#5F6B76">one origin</text>
  <path d="M154 90H215" fill="none" stroke="#6655A6" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M215 90C250 90 248 30 286 30M215 90c35 0 33-30 71-30M215 90h71M215 90c35 0 33 30 71 30M215 90c35 0 33 60 71 60" fill="none" stroke="#6655A6" stroke-width="4"/>
  <g fill="#FFFFFF" stroke="#17212B" stroke-width="3">
    <rect x="286" y="10" width="126" height="40" rx="8"/>
    <rect x="286" y="50" width="126" height="40" rx="8"/>
    <rect x="286" y="90" width="126" height="40" rx="8"/>
    <rect x="286" y="130" width="126" height="40" rx="8"/>
    <rect x="466" y="70" width="126" height="40" rx="8"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="13" fill="#17212B">
    <text x="303" y="35">Helper 01 · 9.8K</text>
    <text x="303" y="75">Helper 02 · 6.2K</text>
    <text x="303" y="115">Helper 03 · 3.1K</text>
    <text x="303" y="155">Helper 04 · 1.8K</text>
    <text x="483" y="95">Helper 05 · 720</text>
  </g>
  <path d="M412 30C450 30 438 90 466 90M412 70c20 0 32 20 54 20M412 110c20 0 32-20 54-20M412 150c38 0 26-60 54-60" fill="none" stroke="#6655A6" stroke-width="3" stroke-dasharray="7 6"/>
  <path d="M592 90h14" fill="none" stroke="#B3261E" stroke-width="4" stroke-dasharray="5 4"/>
  <rect x="606" y="56" width="102" height="68" rx="10" fill="#F8E1DE" stroke="#B3261E" stroke-width="4"/>
  <text x="657" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#B3261E">SAME</text>
  <text x="657" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#B3261E">SOURCE</text>
</svg>
